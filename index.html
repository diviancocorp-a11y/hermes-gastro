<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><!-- __BIZ_TITLE__ --></title>
    <meta name="description" content="<!-- __BIZ_DESCRIPTION__ -->" />
    <meta name="theme-color" content="<!-- __BIZ_THEME_LIGHT__ -->" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="<!-- __BIZ_THEME_DARK__ -->" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:title" content="<!-- __BIZ_TITLE__ -->" />
    <meta property="og:description" content="<!-- __BIZ_DESCRIPTION__ -->" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="<!-- __BIZ_LOCALE__ -->" />
    <meta property="og:image" content="<!-- __BIZ_OG_IMAGE__ -->" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/svg+xml" href="<!-- __BIZ_FAVICON_SVG__ -->" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Preconnect: resuelve DNS+TLS antes de que JS pida datos -->
    <link rel="preconnect" href="<!-- __BIZ_SUPABASE_URL__ -->" crossorigin />
    <link rel="dns-prefetch" href="<!-- __BIZ_SUPABASE_URL__ -->" />

    <!-- Preload fuente principal para evitar FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Structured Data -->
    <script type="application/ld+json">
    <!-- __BIZ_STRUCTURED_DATA__ -->
    </script>
    <!-- Prevent FOUC: apply dark mode before paint -->
    <script>
      (function(){
        var t=localStorage.getItem('lnp-theme');
        if(t==='dark'||((!t)&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
          document.documentElement.setAttribute('data-theme','dark');
        }else if(t==='light'){
          document.documentElement.setAttribute('data-theme','light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
