<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><!-- __BIZ_TITLE__ --></title>
    <meta name="description" content="<!-- __BIZ_DESCRIPTION__ -->" />
    <meta name="theme-color" content="<!-- __BIZ_THEME_LIGHT__ -->" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="<!-- __BIZ_THEME_DARK__ -->" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:title" content="<!-- __BIZ_TITLE__ -->" />
    <meta property="og:description" content="<!-- __BIZ_DESCRIPTION__ -->" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="<!-- __BIZ_LOCALE__ -->" />
    <meta property="og:image" content="<!-- __BIZ_OG_IMAGE__ -->" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" href="<!-- __BIZ_FAVICON_SVG__ -->" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Preconnect: resuelve DNS+TLS antes de que JS pida datos -->
    <link rel="preconnect" href="<!-- __BIZ_SUPABASE_URL__ -->" crossorigin />
    <link rel="dns-prefetch" href="<!-- __BIZ_SUPABASE_URL__ -->" />

    <!-- Google Fonts: preconnect + preload de la CSS para evitar FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload"
          href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" />
    </noscript>

    <!-- Structured Data -->
    <script type="application/ld+json">
    <!-- __BIZ_STRUCTURED_DATA__ -->
    </script>

    <!-- Prevent FOUC: apply dark mode before paint -->
    <script>
      (function(){
        var t=localStorage.getItem('hermes-theme');
        if(t==='dark'||((!t)&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
          document.documentElement.setAttribute('data-theme','dark');
        }else if(t==='light'){
          document.documentElement.setAttribute('data-theme','light');
        }
      })();
    </script>
  </head>
  <body>
    <!-- Anti-flash de tema del CATALOGO (jun 2026): aplica el ultimo tema
         guardado ANTES del primer pintado. Sin esto la pagina carga blanca
         y "salta" al tema oscuro cuando llegan los settings. -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('cp_theme');
          var bgs = { ambar: '#FFFFFF', noche: '#161412', carbon: '#FAF5EE' };
          if (t && bgs[t]) {
            document.body.setAttribute('data-cp-theme', t);
            document.body.style.background = bgs[t];
            document.documentElement.style.background = bgs[t];
          }
        } catch (e) { /* sin storage: tema default */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
