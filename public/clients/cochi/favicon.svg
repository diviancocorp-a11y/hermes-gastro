<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Red background -->
  <circle cx="32" cy="32" r="32" fill="#c91b14"/>
  <!-- Pig face - large and centered -->
  <circle cx="32" cy="35" r="18" fill="#e3debe"/>
  <!-- Ears - big and visible -->
  <circle cx="18" cy="20" r="8" fill="#e3debe"/>
  <circle cx="46" cy="20" r="8" fill="#e3debe"/>
  <circle cx="18" cy="20" r="5" fill="#c91b14"/>
  <circle cx="46" cy="20" r="5" fill="#c91b14"/>
  <!-- Snout - prominent -->
  <ellipse cx="32" cy="40" rx="10" ry="7" fill="#d4c8b0"/>
  <!-- Nostrils - big -->
  <ellipse cx="28" cy="40" rx="3" ry="2.5" fill="#c91b14"/>
  <ellipse cx="36" cy="40" rx="3" ry="2.5" fill="#c91b14"/>
  <!-- Eyes - big dots -->
  <circle cx="24" cy="30" r="3" fill="#221c1a"/>
  <circle cx="40" cy="30" r="3" fill="#221c1a"/>
</svg>
