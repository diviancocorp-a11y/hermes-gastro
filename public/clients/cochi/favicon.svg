<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Red background -->
  <circle cx="32" cy="32" r="32" fill="#c91b14"/>
  <!-- Llama neck -->
  <rect x="27" y="14" width="10" height="26" rx="5" fill="#e3debe"/>
  <!-- Llama head -->
  <ellipse cx="32" cy="15" rx="9" ry="8" fill="#e3debe"/>
  <!-- Ears - tall -->
  <ellipse cx="25" cy="8" rx="3" ry="6" fill="#e3debe" transform="rotate(-10 25 8)"/>
  <ellipse cx="39" cy="8" rx="3" ry="6" fill="#e3debe" transform="rotate(10 39 8)"/>
  <!-- Inner ears -->
  <ellipse cx="25" cy="8" rx="1.5" ry="4" fill="#c91b14" transform="rotate(-10 25 8)"/>
  <ellipse cx="39" cy="8" rx="1.5" ry="4" fill="#c91b14" transform="rotate(10 39 8)"/>
  <!-- Body -->
  <ellipse cx="32" cy="47" rx="15" ry="11" fill="#e3debe"/>
  <!-- Legs -->
  <rect x="21" y="53" width="5" height="9" rx="2.5" fill="#e3debe"/>
  <rect x="38" y="53" width="5" height="9" rx="2.5" fill="#e3debe"/>
  <!-- Eyes -->
  <circle cx="28" cy="14" r="2" fill="#c91b14"/>
  <circle cx="36" cy="14" r="2" fill="#c91b14"/>
  <!-- Snout -->
  <ellipse cx="32" cy="19" rx="4" ry="2.5" fill="#c91b14"/>
</svg>
